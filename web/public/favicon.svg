<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- board background -->
  <rect width="32" height="32" rx="6" fill="#2563eb"/>
  <!-- grid holes (grey) -->
  <circle cx="8"  cy="10" r="4" fill="#1d4ed8" opacity="0.6"/>
  <circle cx="16" cy="10" r="4" fill="#1d4ed8" opacity="0.6"/>
  <circle cx="24" cy="10" r="4" fill="#1d4ed8" opacity="0.6"/>
  <circle cx="8"  cy="20" r="4" fill="#1d4ed8" opacity="0.6"/>
  <circle cx="16" cy="20" r="4" fill="#1d4ed8" opacity="0.6"/>
  <circle cx="24" cy="20" r="4" fill="#1d4ed8" opacity="0.6"/>
  <!-- winning diagonal: yellow -->
  <circle cx="8"  cy="20" r="4" fill="#facc15"/>
  <circle cx="16" cy="20" r="4" fill="#f97316" opacity="0.3"/>
  <circle cx="16" cy="10" r="4" fill="#facc15"/>
  <circle cx="24" cy="10" r="4" fill="#facc15"/>
  <!-- red piece -->
  <circle cx="8"  cy="10" r="4" fill="#ef4444"/>
  <circle cx="24" cy="20" r="4" fill="#ef4444"/>
</svg>
